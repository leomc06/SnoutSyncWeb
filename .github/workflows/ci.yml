name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: SnoutSync
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d SnoutSync"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/SnoutSync
      JWT_SECRET: ci-secret-for-tests-only
      API_PORT: 3999
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix server

      - name: Install frontend dependencies
        run: npm ci --prefix client

      - name: Lint backend syntax
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Run backend tests
        run: npm test
